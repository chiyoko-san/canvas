<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>絵文字当て・今日の一問</title>
<style>
  :root {
    --bg:#f5f6f8; --surface:#ffffff; --surface2:#f0f1f4;
    --text:#1d1d22; --muted:#6b6b76; --hint:#9a9aa4;
    --ok:#16a34a; --ok-soft:#dcfce7; --ng:#e24b4a; --ng-soft:#fde4e4;
    --accent:#ff9500; --accent-soft:#fff0db; --brand:#7c5cff; --brand-soft:#ece7ff;
    --border:#e6e7ec; --border2:#dcdde3;
    --shadow:0 1px 3px rgba(20,20,40,0.06),0 1px 2px rgba(20,20,40,0.04);
    --shadow-lg:0 4px 16px rgba(20,20,40,0.10);
    --radius:18px; --radius-sm:12px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:16px; line-height:1.5; }
  .wrap { max-width:440px; margin:0 auto; padding:22px 14px 48px; }

  .title { text-align:center; margin-bottom:16px; }
  .title h1 { font-size:21px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  .title .sub { font-size:12px; color:var(--muted); margin:6px 0 0; }

  .statbar { display:flex; gap:8px; margin-bottom:16px; }
  .stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:10px; text-align:center; box-shadow:var(--shadow); }
  .stat .k { font-size:10px; color:var(--muted); margin:0 0 2px; }
  .stat .v { font-size:18px; font-weight:700; margin:0; font-variant-numeric:tabular-nums; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:22px 18px; margin-bottom:16px; }
  .day-label { text-align:center; font-size:12px; color:var(--brand); font-weight:700;
    background:var(--brand-soft); display:inline-block; padding:4px 12px; border-radius:999px;
    margin:0 auto 16px; }
  .day-wrap { text-align:center; }
  .emoji-display { font-size:54px; text-align:center; line-height:1.3; margin:4px 0 6px;
    word-break:break-word; }
  .genre-tag { text-align:center; font-size:12px; color:var(--muted); margin-bottom:18px; }

  .tries { display:flex; gap:6px; justify-content:center; margin-bottom:16px; }
  .try-dot { width:10px; height:10px; border-radius:50%; background:var(--border2); }
  .try-dot.used { background:var(--ng); }
  .try-dot.ok { background:var(--ok); }

  .answer-row { display:flex; gap:8px; margin-bottom:12px; }
  .answer-row input { flex:1; height:52px; padding:0 14px; font-size:16px; background:var(--surface);
    border:1.5px solid var(--border2); border-radius:13px; color:var(--text); }
  .answer-row input:focus { outline:none; border-color:var(--brand); }
  .answer-row button { height:52px; padding:0 20px; border:none; border-radius:13px; background:var(--brand);
    color:#fff; font-size:16px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .answer-row button:active { background:#6a4ae0; }
  .answer-row button:disabled { opacity:0.4; cursor:default; }

  .feedback { text-align:center; font-size:14px; font-weight:600; min-height:22px; margin-bottom:10px; }
  .feedback.ok { color:var(--ok); } .feedback.ng { color:var(--ng); }

  .hint-area { background:var(--surface2); border-radius:12px; padding:12px 14px; margin-bottom:14px; display:none; }
  .hint-area.show { display:block; }
  .hint-area .ht { font-size:12px; color:var(--muted); font-weight:600; margin:0 0 4px; }
  .hint-area .hv { font-size:14px; margin:0; }
  .hint-btn { width:100%; height:44px; border:1px dashed var(--border2); border-radius:12px;
    background:transparent; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; margin-bottom:14px; }
  .hint-btn:active { background:var(--surface2); }

  /* 結果 */
  .result { display:none; text-align:center; }
  .result.show { display:block; }
  .result .big { font-size:22px; font-weight:700; margin:0 0 6px; }
  .result .answer { font-size:16px; color:var(--muted); margin:0 0 6px; }
  .result .answer b { color:var(--text); }
  .result .squares { font-size:24px; letter-spacing:3px; margin:14px 0; }
  .result .worldrate { font-size:13px; color:var(--muted); margin:0 0 16px; }
  .share-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:52px;
    border:none; border-radius:13px; background:var(--ok); color:#fff; font-size:16px; font-weight:700; cursor:pointer; }
  .share-btn:active { background:#13893d; }
  .next-note { font-size:12px; color:var(--hint); margin:16px 0 0; }

  .status { text-align:center; font-size:12px; color:var(--hint); margin:16px 0 0; min-height:16px; }
  .foot { text-align:center; font-size:11px; color:var(--hint); margin-top:18px; line-height:1.7; }

  .toast { position:fixed; left:50%; top:18px; transform:translateX(-50%) translateY(-100px);
    background:var(--text); color:#fff; font-weight:600; padding:11px 20px; border-radius:999px;
    font-size:14px; opacity:0; transition:all 0.4s cubic-bezier(.2,.8,.2,1); z-index:60; pointer-events:none;
    max-width:90%; text-align:center; box-shadow:var(--shadow-lg); }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<div class="wrap">
  <div class="title">
    <h1>🧩 絵文字当て・今日の一問</h1>
    <p class="sub">毎日0時に全世界共通の一問。何の絵文字クイズ？</p>
  </div>

  <div class="statbar">
    <div class="stat"><p class="k">🔥 連勝</p><p class="v" id="streak">0</p></div>
    <div class="stat"><p class="k">正解した日数</p><p class="v" id="wins">0</p></div>
    <div class="stat"><p class="k">正解率</p><p class="v" id="rate">—</p></div>
  </div>

  <div class="card">
    <div class="day-wrap"><span class="day-label" id="dayLabel">Day —</span></div>
    <div class="emoji-display" id="emojiDisplay">⏳</div>
    <p class="genre-tag" id="genreTag">ジャンル：—</p>

    <div class="tries" id="tries"></div>

    <!-- 入力エリア -->
    <div id="playArea">
      <div class="answer-row">
        <input id="answerInput" placeholder="答えを入力" autocomplete="off" />
        <button id="submitBtn">回答</button>
      </div>
      <p class="feedback" id="feedback"></p>
      <button class="hint-btn" id="hintBtn">💡 ヒントを見る</button>
      <div class="hint-area" id="hintArea"><p class="ht">ヒント</p><p class="hv" id="hintText"></p></div>
    </div>

    <!-- 結果エリア -->
    <div class="result" id="resultArea">
      <p class="big" id="resultBig"></p>
      <p class="answer" id="resultAnswer"></p>
      <div class="squares" id="resultSquares"></div>
      <p class="worldrate" id="worldRate"></p>
      <button class="share-btn" id="shareBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        結果をシェア
      </button>
      <p class="next-note" id="nextNote"></p>
    </div>
  </div>

  <div class="status" id="status">接続中…</div>
  <p class="foot">毎日0時にお題が変わります。<br>全世界が同じ一問に挑戦中。</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ===== 自分のFirebase設定に書き換える（THE BUTTONと同じでOK） =====
const firebaseConfig = {
  apiKey: "THE_BUTTONと同じAPIキーをここに貼る",
  authDomain: "one-button-7ab53.firebaseapp.com",
  databaseURL: "https://one-button-7ab53-default-rtdb.firebaseio.com",
  projectId: "one-button-7ab53",
};
// =================================================================

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const $ = id => document.getElementById(id);

const MAX_TRIES = 3;

// お題プール [絵文字, 答え（配列＝表記ゆれ許容）, ジャンル, ヒント]
const PUZZLES = [
  ["🦁👑", ["ライオンキング","らいおんきんぐ","thelionking","lionking"], "映画", "ディズニーの名作アニメ"],
  ["🕷️🧑", ["スパイダーマン","すぱいだーまん","spiderman"], "映画", "蜘蛛の能力を持つヒーロー"],
  ["🧊⛄❄️", ["アナと雪の女王","アナ雪","frozen","ありのままで"], "映画", "ありのままで〜"],
  ["🐟🔍", ["ファインディングニモ","ニモ","findingnemo"], "映画", "迷子の魚を探す物語"],
  ["🍫🏭", ["チャーリーとチョコレート工場","チョコレート工場","willywonka"], "映画", "甘い工場が舞台"],
  ["👻🚫", ["ゴーストバスターズ","ghostbusters"], "映画", "幽霊退治の専門家たち"],
  ["🐀🍳", ["レミーのおいしいレストラン","ratatouille","ラタトゥイユ"], "映画", "料理するネズミ"],
  ["🦖🏞️", ["ジュラシックパーク","jurassicpark","ジュラシックワールド"], "映画", "恐竜が蘇るテーマパーク"],
  ["🐝🍯", ["はちみつ","ハチミツ","honey","蜂蜜"], "食べ物", "ミツバチが作る甘いもの"],
  ["🍙🔺", ["おにぎり","オニギリ","riceball","おむすび"], "食べ物", "三角形の定番"],
  ["🐙🔥⚽", ["たこ焼き","タコ焼き","takoyaki"], "食べ物", "大阪の粉もん"],
  ["🍜🍥", ["ラーメン","らーめん","ramen"], "食べ物", "ナルトが乗ってる麺"],
  ["🍵🍡", ["お団子","だんご","おだんご","dango"], "食べ物", "三色のあれ"],
  ["🐔⚡", ["焼き鳥","やきとり","yakitori"], "食べ物", "串に刺した鶏"],
  ["🌊🌰", ["猿も木から落ちる","さるもきからおちる"], "ことわざ", "達人でも失敗する"],
  ["🐈🥷", ["猫に小判","ねこにこばん"], "ことわざ", "価値がわからない例え"],
  ["🐸👶➡️🐸", ["蛙の子は蛙","かえるのこはかえる"], "ことわざ", "子は親に似る"],
  ["💧🪨", ["雨だれ石を穿つ","あまだれいしをうがつ","点滴石を穿つ"], "ことわざ", "継続は力なり的な"],
  ["🐴🎶", ["馬の耳に念仏","うまのみみにねんぶつ"], "ことわざ", "言っても無駄なこと"],
  ["🦊👰", ["きつねの嫁入り","キツネの嫁入り","きつねのよめいり"], "ことわざ", "晴れてるのに雨"],
  ["🐘🦏🦒", ["サバンナ","savanna","アフリカ"], "場所", "野生動物のいる草原"],
  ["🗼🇫🇷", ["エッフェル塔","パリ","eiffel","paris"], "場所", "フランスの名所"],
  ["🗽🇺🇸", ["自由の女神","ニューヨーク","statueofliberty"], "場所", "アメリカの象徴"],
  ["🏯🦌", ["奈良","なら","nara"], "場所", "鹿で有名な県"],
  ["🌸🗻", ["富士山","ふじさん","fuji","mtfuji"], "場所", "日本一の山"],
  ["🐶🚀", ["宇宙犬","ライカ","スペースドッグ"], "その他", "宇宙に行った犬"],
  ["⏰🐰", ["不思議の国のアリス","アリス","aliceinwonderland"], "映画", "時計を持つウサギが登場"],
  ["👨‍🍳🐭", ["レミーのおいしいレストラン","ratatouille"], "映画", "ネズミのシェフ"],
  ["🌙🚶", ["ムーンウォーク","moonwalk","マイケルジャクソン"], "その他", "後ろに進んで見える歩き方"],
  ["🧠🍔", ["脳に栄養","ブレインフード","brainfood"], "その他", "頭に良い食べ物"],
];

// --- 表記ゆれ正規化 ---
function normalize(s){
  if(!s) return "";
  s=s.trim().toLowerCase();
  // カタカナ→ひらがな
  s=s.replace(/[\u30a1-\u30f6]/g, c=>String.fromCharCode(c.charCodeAt(0)-0x60));
  // 全角英数→半角
  s=s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xfee0));
  // 記号・空白・長音・中黒を除去
  s=s.replace(/[\s\u3000ー・,，、。.!！?？「」『』（）()【】\-_]/g,"");
  return s;
}
function isCorrect(input, answers){
  const n=normalize(input);
  if(!n) return false;
  return answers.some(a=>{
    const na=normalize(a);
    return n===na || (na.length>=4 && (n.includes(na)||na.includes(n)));
  });
}

// --- 日付ベースのお題選択（全世界共通） ---
function dayNumber(){
  // 2026-01-01 を起点に経過日数
  const start=Date.UTC(2026,0,1);
  const now=new Date();
  const today=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  return Math.floor((today-start)/86400000);
}
function todayKey(){ const n=new Date(); return n.getFullYear()+"-"+(n.getMonth()+1)+"-"+n.getDate(); }

const dayNo=dayNumber();
const puzzle=PUZZLES[((dayNo%PUZZLES.length)+PUZZLES.length)%PUZZLES.length];
const [emoji, answers, genre, hint]=puzzle;

let tries=0, solved=false, finished=false;
let progress=JSON.parse(localStorage.getItem("eq_progress")||"{}"); // {dayKey:{tries,solved}}
let stats=JSON.parse(localStorage.getItem("eq_stats")||'{"streak":0,"wins":0,"played":0,"lastDay":null}');

function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }

function renderTries(){
  const el=$("tries"); el.innerHTML="";
  for(let i=0;i<MAX_TRIES;i++){
    const d=document.createElement("div"); d.className="try-dot";
    if(i<tries){ d.classList.add(solved&&i===tries-1?"ok":"used"); }
    el.appendChild(d);
  }
}
function renderStats(){
  $("streak").textContent=stats.streak;
  $("wins").textContent=stats.wins;
  $("rate").textContent = stats.played? Math.round(stats.wins/stats.played*100)+"%" : "—";
}

// Wordle風の四角列（試行数で🟩⬜表現）
function squaresFor(triesUsed, didSolve){
  let s="";
  for(let i=0;i<MAX_TRIES;i++){
    if(didSolve){ s += (i===triesUsed-1)?"🟩":"⬜"; }
    else { s += "🟥"; }
  }
  return s;
}

function showResult(){
  finished=true;
  $("playArea").style.display="none";
  $("resultArea").classList.add("show");
  $("resultBig").textContent = solved ? "🎉 正解！" : "😢 残念…";
  $("resultBig").style.color = solved ? "var(--ok)" : "var(--ng)";
  $("resultAnswer").innerHTML = `答え：<b>${answers[0]}</b>`;
  const sq = squaresFor(tries, solved);
  $("resultSquares").textContent = sq;
  $("nextNote").textContent = "明日0時に次の一問が出ます。連勝を切らさないように！";
  // 全世界の正解率を購読
  onValue(ref(db,"emojiquiz/day"+dayNo), snap=>{
    const d=snap.val()||{solved:0,total:0};
    if(d.total>0){ $("worldRate").textContent=`全世界の正解率：${Math.round(d.solved/d.total*100)}%（${d.total.toLocaleString()}人挑戦）`; }
    else { $("worldRate").textContent="あなたが世界で最初の挑戦者！"; }
  });
}

function recordToWorld(didSolve){
  runTransaction(ref(db,"emojiquiz/day"+dayNo), d=>{
    d=d||{solved:0,total:0};
    d.total=(d.total||0)+1;
    if(didSolve) d.solved=(d.solved||0)+1;
    return d;
  }).catch(()=>{});
}

function finishDay(didSolve){
  // 統計更新（1日1回だけ）
  if(stats.lastDay!==dayNo){
    stats.played++;
    if(didSolve){
      stats.wins++;
      // 連勝：前日も正解していれば継続、そうでなければ1からスタート
      stats.streak = (stats.lastWin===dayNo-1) ? (stats.streak||0)+1 : 1;
      stats.lastWin=dayNo;
    } else {
      stats.streak=0;
    }
    stats.lastDay=dayNo;
    localStorage.setItem("eq_stats",JSON.stringify(stats));
    recordToWorld(didSolve);
  }
  progress[todayKey()]={tries,solved:didSolve,dayNo};
  localStorage.setItem("eq_progress",JSON.stringify(progress));
  renderStats();
  showResult();
}

function submit(){
  if(finished) return;
  const val=$("answerInput").value;
  if(!val.trim()) return;
  if(isCorrect(val, answers)){
    tries++; solved=true; renderTries();
    $("feedback").textContent="正解！🎉"; $("feedback").className="feedback ok";
    setTimeout(()=>finishDay(true),500);
  } else {
    tries++; renderTries();
    $("answerInput").value="";
    if(tries>=MAX_TRIES){
      $("feedback").textContent="不正解… 答えを表示します"; $("feedback").className="feedback ng";
      setTimeout(()=>finishDay(false),500);
    } else {
      $("feedback").textContent=`不正解… 残り${MAX_TRIES-tries}回`; $("feedback").className="feedback ng";
    }
  }
}

$("submitBtn").addEventListener("click",submit);
$("answerInput").addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
$("hintBtn").addEventListener("click",()=>{ $("hintText").textContent=hint; $("hintArea").classList.add("show"); $("hintBtn").style.display="none"; });

$("shareBtn").addEventListener("click",async ()=>{
  const sq=squaresFor(tries,solved);
  const text=`🧩 絵文字当て Day ${dayNo}\n${emoji}\n${sq} ${solved?`(${tries}回で正解)`:"(不正解)"}\n挑戦する👇`;
  const url=location.origin+location.pathname;
  if(navigator.share){
    try{ await navigator.share({title:"絵文字当て・今日の一問", text, url}); return; }
    catch(e){ if(e.name==="AbortError") return; }
  }
  try{ await navigator.clipboard.writeText(text+"\n"+url); toast("🔗 結果をコピーした"); }
  catch(e){ prompt("コピーしてシェア", text+"\n"+url); }
});

// --- 初期化 ---
function init(){
  $("dayLabel").textContent="Day "+dayNo;
  $("emojiDisplay").textContent=emoji;
  $("genreTag").textContent="ジャンル："+genre;
  renderStats();
  $("status").textContent="接続済み · 全世界が同じ一問に挑戦中";

  // すでに今日プレイ済みなら結果を復元
  const todays=progress[todayKey()];
  if(todays && todays.dayNo===dayNo){
    tries=todays.tries; solved=todays.solved; finished=true;
    renderTries(); showResult();
  } else {
    renderTries();
    setTimeout(()=>$("answerInput").focus(),300);
  }
}
init();
</script>
</body>
</html>
